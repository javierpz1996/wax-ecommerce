<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hero abstracto">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0A0A"/>
      <stop offset="0.45" stop-color="#3F3F46"/>
      <stop offset="1" stop-color="#E4E4E7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 280) rotate(60) scale(520 520)">
      <stop stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%" filterUnits="objectBoundingBox">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="56" fill="url(#bg)"/>
  <circle cx="380" cy="280" r="380" fill="url(#glow)"/>
  <circle cx="940" cy="620" r="300" fill="#FFFFFF" fill-opacity="0.10" filter="url(#blur)"/>

  <g opacity="0.95">
    <rect x="140" y="180" width="520" height="360" rx="34" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.30"/>
    <rect x="190" y="240" width="210" height="16" rx="8" fill="#0A0A0A" fill-opacity="0.75"/>
    <rect x="190" y="270" width="320" height="14" rx="7" fill="#0A0A0A" fill-opacity="0.35"/>
    <rect x="190" y="304" width="280" height="14" rx="7" fill="#0A0A0A" fill-opacity="0.30"/>

    <rect x="190" y="356" width="140" height="42" rx="21" fill="#0A0A0A" fill-opacity="0.80"/>
    <rect x="346" y="356" width="140" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.30" stroke="#FFFFFF" stroke-opacity="0.25"/>
  </g>

  <g opacity="0.95">
    <rect x="650" y="320" width="410" height="410" rx="42" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <path d="M705 650 C 790 560, 865 760, 995 580" stroke="#FFFFFF" stroke-opacity="0.50" stroke-width="10" stroke-linecap="round"/>
    <circle cx="775" cy="520" r="24" fill="#FFFFFF" fill-opacity="0.65"/>
    <circle cx="930" cy="500" r="18" fill="#FFFFFF" fill-opacity="0.45"/>
  </g>
</svg>

